version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: bharath-grocery-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: securepassword
      MYSQL_DATABASE: bharath_fresh_db
    ports:
      - "3306:3306"
    volumes:
      - grocery_db_vol:/var/lib/mysql

  backend:
    build: ./backend
    container_name: bharath-grocery-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      DB_HOST: database
      DB_USER: root
      DB_PASSWORD: securepassword
      DB_NAME: bharath_fresh_db
    depends_on:
      - database

volumes:
  grocery_db_vol: